<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escopo de Execução — Pintura</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --green:#1D6A3E;--green-light:#E8F5EE;--green-mid:#2E8B57;
  --gray:#2E4057;--gray-light:#F5F6F8;--gray-mid:#6B7280;
  --border:#E5E7EB;--white:#fff;--red:#991B1B;--amber:#854F0B;
  --radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F2F5;color:#1a1a2e;min-height:100vh}
.topbar{background:var(--gray);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
.mode-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.mode-badge.admin{background:#FEF3C7;color:#92400E}
.mode-badge.view{background:#D1FAE5;color:#065F46}
.mode-badge.client{background:#EDE9FE;color:#4C1D95}
.client-checklist{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:16px}
.client-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #F3F4F6}
.client-item:last-child{border-bottom:none}
.client-check{width:22px;height:22px;border-radius:6px;border:2px solid #D1D5DB;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;background:#fff}
.client-check.checked{background:#7C3AED;border-color:#7C3AED}
.client-check.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.client-item-text{font-size:14px;color:#1a1a2e;line-height:1.5}
.client-item-text.done{text-decoration:line-through;color:#9CA3AF}
.client-amb-title{font-size:13px;font-weight:700;color:#4C1D95;text-transform:uppercase;letter-spacing:.04em;padding:14px 0 6px;display:flex;align-items:center;gap:6px}
.client-sig-box{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;text-align:center;margin-top:16px}
.client-progress{height:10px;background:#EDE9FE;border-radius:5px;margin:12px 0}
.client-progress-fill{height:10px;border-radius:5px;background:#7C3AED;transition:width .4s}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:var(--white);font-size:13px;font-weight:500;cursor:pointer;color:#374151;transition:all .15s;text-decoration:none}
.btn:hover{background:#f9fafb}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{background:#165a34}
.btn.danger{color:var(--red);border-color:#FCA5A5}
.btn.danger:hover{background:#FEF2F2}
.btn.ghost{background:transparent;border-color:transparent;color:#fff}
.btn.ghost:hover{background:rgba(255,255,255,.1)}
.btn.sm{padding:5px 9px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.main{padding:20px;max-width:960px;margin:0 auto}
.obra-header{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.obra-title{font-size:22px;font-weight:700;color:var(--gray);margin-bottom:6px}
.obra-meta{display:flex;flex-wrap:wrap;gap:16px;font-size:13px;color:var(--gray-mid)}
.obra-meta span{display:flex;align-items:center;gap:4px}
.progress-bar-wrap{margin-top:14px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--gray-mid);margin-bottom:5px}
.progress-bar{height:8px;background:#E5E7EB;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s}
.ambiente-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.ambiente-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;gap:8px}
.ambiente-header:hover{background:#fafafa}
.ambiente-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.ambiente-icon{width:36px;height:36px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ambiente-icon i{color:var(--green);font-size:18px}
.ambiente-name{font-size:15px;font-weight:600;color:#1a1a2e}
.ambiente-sub{font-size:12px;color:var(--gray-mid);margin-top:1px}
.ambiente-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pct-badge{font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
.pct-badge.done{background:#D1FAE5;color:#065F46}
.pct-badge.partial{background:#FEF3C7;color:#92400E}
.pct-badge.none{background:#F3F4F6;color:#6B7280}
.ambiente-body{border-top:1px solid #F3F4F6;display:none}
.ambiente-body.open{display:block}
.itens-list{padding:0 18px 14px}
.item-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F9FAFB}
.item-row:last-child{border-bottom:none}
.item-check{width:20px;height:20px;border-radius:5px;border:2px solid #D1D5DB;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;background:var(--white)}
.item-check.checked{background:var(--green);border-color:var(--green)}
.item-check.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.item-body{flex:1;min-width:0}
.item-desc{font-size:14px;color:#1a1a2e;line-height:1.4}
.item-desc.done{text-decoration:line-through;color:#9CA3AF}
.item-obs{font-size:12px;color:var(--gray-mid);margin-top:3px;font-style:italic}
.item-obs-input{width:100%;border:none;border-bottom:1px dashed #D1D5DB;font-size:12px;color:#6B7280;padding:2px 0;margin-top:4px;outline:none;background:none;font-style:italic}
.item-obs-input:focus{border-bottom-color:var(--green)}
.item-actions{display:flex;gap:4px;flex-shrink:0}
.fotos-section{padding:14px 18px;border-top:1px solid #F3F4F6;background:#FAFAFA}
.fotos-title{font-size:12px;font-weight:600;color:var(--gray-mid);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.fotos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.foto-col{}
.foto-col-label{font-size:11px;font-weight:600;color:var(--gray-mid);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.foto-col-label.antes{color:#92400E}
.foto-col-label.depois{color:#065F46}
.foto-items{display:flex;flex-wrap:wrap;gap:6px;min-height:60px}
.foto-thumb{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.foto-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.foto-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);border:none;border-radius:4px;color:#fff;cursor:pointer;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px}
.foto-add{width:72px;height:72px;border-radius:8px;border:2px dashed #D1D5DB;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#9CA3AF;font-size:10px;gap:2px;background:var(--white);transition:all .15s}
.foto-add:hover{border-color:var(--green);color:var(--green)}
.foto-add i{font-size:20px}
.add-item-row{display:flex;gap:8px;padding:8px 18px 12px;border-top:1px solid #F3F4F6}
.add-item-input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;outline:none}
.add-item-input:focus{border-color:var(--green)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:420px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:14px;color:#1a1a2e}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;color:#1a1a2e;outline:none;font-family:inherit}
.field input:focus,.field textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,107,62,.1)}
.field textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.signature-box{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-top:20px;text-align:center}
.signature-title{font-size:17px;font-weight:700;color:var(--gray);margin-bottom:6px}
.signature-sub{font-size:13px;color:var(--gray-mid);margin-bottom:20px}
.sig-canvas-wrap{border:2px dashed #D1D5DB;border-radius:8px;margin-bottom:12px;overflow:hidden;cursor:crosshair;background:#FAFAFA}
canvas#sig-canvas{display:block;width:100%;touch-action:none}
.sig-info{display:flex;gap:10px;flex-wrap:wrap}
.sig-info .field{flex:1;min-width:140px}
.sig-controls{display:flex;gap:8px;justify-content:center;margin-top:10px}
.sig-done-wrap{display:none;text-align:center;padding:16px}
.sig-done-wrap.show{display:block}
.sig-done-img{max-width:300px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:400;display:flex;align-items:center;justify-content:center}
.lightbox.hidden{display:none}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
.lightbox-close{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #e5e7eb;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{text-align:center;padding:60px 20px;color:var(--gray-mid);font-size:15px}
.empty-state{text-align:center;padding:32px;color:var(--gray-mid);font-size:13px}
.share-box{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
.share-url{font-size:12px;color:#1D4ED8;word-break:break-all;flex:1}
.admin-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;background:var(--white);border-radius:var(--radius);padding:12px 16px;box-shadow:var(--shadow)}
@media(max-width:600px){
  .fotos-grid{grid-template-columns:1fr}
  .obra-meta{gap:10px}
  .main{padding:12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo"><i class="ti ti-paint" style="vertical-align:-2px;margin-right:4px"></i>Escopo de Execução</div>
    <span class="mode-badge" id="mode-badge">Carregando...</span>
  </div>
  <div class="topbar-right" id="topbar-actions"></div>
</div>

<div class="main" id="main-content">
  <div class="loading-full"><span class="spinner"></span><br><br>Carregando obra...</div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="modal" id="modal-inner"></div>
</div>

<div class="lightbox hidden" id="lightbox">
  <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.add('hidden')"><i class="ti ti-x"></i></button>
  <img id="lightbox-img" src="" alt="Foto">
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA = 'https://lnzfnuxtquvearoplegg.supabase.co';
const KEY  = 'sb_publishable_IcSssfeMM91SY1cvqkRZgw_HQWSaFu_';
const HDR  = {'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=representation'};

// ---- MODE DETECTION ----
const params = new URLSearchParams(location.search);
const IS_ADMIN = params.get('admin') === '1' || location.hash === '#admin';
const IS_CLIENT = params.get('cliente') === '1';
const OBRA_ID  = params.get('obra') || null;

// ---- STATE ----
let obra = null, ambientes = [], itens = [], fotos = [];

// ---- API ----
async function api(method, path, body){
  const r = await fetch(SUPA+'/rest/v1/'+path,{
    method, headers:HDR, body:body?JSON.stringify(body):undefined
  });
  const t = await r.text();
  if(!r.ok) throw new Error(t);
  return t ? JSON.parse(t) : null;
}

async function uploadFoto(file){
  const ext = file.name.split('.').pop();
  const name = Date.now()+'.'+ext;
  const r = await fetch(`${SUPA}/storage/v1/object/fotos-escopo/${name}`,{
    method:'POST',
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':file.type},
    body:file
  });
  if(!r.ok) throw new Error(await r.text());
  return `${SUPA}/storage/v1/object/public/fotos-escopo/${name}`;
}

// ---- LOAD ----
async function loadAll(){
  try{
    if(OBRA_ID){
      const [o,a,it,f] = await Promise.all([
        api('GET',`obras?id=eq.${OBRA_ID}&select=*`),
        api('GET',`ambientes?obra_id=eq.${OBRA_ID}&select=*&order=ordem.asc`),
        api('GET',`itens?select=*,ambientes!inner(obra_id)&ambientes.obra_id=eq.${OBRA_ID}&order=ordem.asc`),
        api('GET',`fotos?select=*,ambientes!inner(obra_id)&ambientes.obra_id=eq.${OBRA_ID}&order=created_at.asc`)
      ]);
      obra = o?.[0]||null;
      ambientes = a||[];
      itens = it||[];
      fotos = f||[];
    } else {
      // No obra specified — show list or create
      obra = null; ambientes = []; itens = []; fotos = [];
    }
    render();
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="loading-full" style="color:#991b1b"><i class="ti ti-alert-circle" style="font-size:32px"></i><br><br>Erro ao carregar: ${e.message}<br><br><button class="btn primary" onclick="location.reload()">Tentar novamente</button></div>`;
  }
}

// ---- RENDER ----
function render(){
  document.getElementById('mode-badge').textContent = IS_ADMIN ? '🔧 Administrador' : IS_CLIENT ? '👤 Cliente' : '👷 Técnico';
  document.getElementById('mode-badge').className = 'mode-badge '+(IS_ADMIN?'admin':IS_CLIENT?'client':'view');

  if(!obra){
    renderNoObra();
    return;
  }

  renderTopbarActions();
  renderMain();
}

function renderTopbarActions(){
  // Back button always shown
  const backBtn=IS_CLIENT?'':`<a href="${location.pathname}${IS_ADMIN?'?admin=1':''}" class="btn ghost sm"><i class="ti ti-arrow-left"></i> Obras</a>`;
  const tb = document.getElementById('topbar-actions');
  if(IS_ADMIN){
    tb.innerHTML=backBtn+`
      <button class="btn ghost sm" onclick="shareLink()"><i class="ti ti-share" aria-hidden="true"></i> Link técnico</button>
      <button class="btn ghost sm" onclick="editObra()"><i class="ti ti-edit" aria-hidden="true"></i> Editar obra</button>
      <button class="btn ghost sm" onclick="addAmbiente()"><i class="ti ti-plus" aria-hidden="true"></i> Nova área</button>`;
  } else {
    tb.innerHTML=backBtn+`<span style="color:#ccc;font-size:12px">Modo somente leitura — marque os itens concluídos</span>`;
  }
}

function pct(ambId){
  const its = itens.filter(i=>i.ambiente_id===ambId);
  if(!its.length) return 0;
  return Math.round(its.filter(i=>i.concluido).length/its.length*100);
}

function totalPct(){
  if(!itens.length) return 0;
  return Math.round(itens.filter(i=>i.concluido).length/itens.length*100);
}

function renderMain(){
  const p = totalPct();
  const main = document.getElementById('main-content');

  let html = `
    <div class="obra-header">
      <div class="obra-title">${obra.nome}</div>
      <div class="obra-meta">
        <span><i class="ti ti-map-pin" aria-hidden="true"></i> ${obra.local||'—'}</span>
        <span><i class="ti ti-user" aria-hidden="true"></i> ${obra.responsavel||'—'}</span>
        ${obra.data_inicio?`<span><i class="ti ti-calendar" aria-hidden="true"></i> ${fmtDate(obra.data_inicio)}</span>`:''}
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-label"><span>${itens.filter(i=>i.concluido).length} de ${itens.length} itens concluídos</span><span style="font-weight:600;color:${p>=100?'#065F46':p>50?'#92400E':'#6B7280'}">${p}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>
      </div>
      ${IS_ADMIN ? `<div style="margin-top:14px">
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">
          <div style="flex:1;min-width:200px">
            <div style="font-size:12px;font-weight:600;color:var(--gray-mid);margin-bottom:6px">🔗 Link para técnicos:</div>
            <div class="share-box">
              <span class="share-url">${location.origin}${location.pathname}?obra=${obra.id}</span>
              <button class="btn sm primary" onclick="copyText('${location.origin}${location.pathname}?obra=${obra.id}','Link técnico copiado!')"><i class="ti ti-copy" aria-hidden="true"></i> Copiar</button>
            </div>
          </div>
          <div style="flex:1;min-width:200px">
            <div style="font-size:12px;font-weight:600;color:#4C1D95;margin-bottom:6px">👤 Link para cliente:</div>
            <div class="share-box" style="background:#F5F3FF;border-color:#C4B5FD">
              <span class="share-url" style="color:#4C1D95">${location.origin}${location.pathname}?obra=${obra.id}&cliente=1</span>
              <button class="btn sm" style="background:#7C3AED;border-color:#7C3AED;color:#fff" onclick="copyText('${location.origin}${location.pathname}?obra=${obra.id}&cliente=1','Link cliente copiado!')"><i class="ti ti-copy" aria-hidden="true"></i> Copiar</button>
            </div>
          </div>
        </div>
        <div style="font-size:12px;font-weight:600;color:var(--gray-mid);margin-bottom:6px" style="display:none">🔗 Link para técnicos:
        <div class="share-box">
          <span class="share-url" id="share-url-txt">${location.origin}${location.pathname}?obra=${obra.id}</span>
          <button class="btn sm primary" onclick="copyShareLink()"><i class="ti ti-copy" aria-hidden="true"></i> Copiar</button>
        </div>
      </div>` : ''}
    </div>`;

  ambientes.forEach(amb => {
    const p2 = pct(amb.id);
    const its = itens.filter(i=>i.ambiente_id===amb.id);
    const fts = fotos.filter(f=>f.ambiente_id===amb.id);
    const badgeClass = p2>=100?'done':p2>0?'partial':'none';
    const badgeLabel = p2>=100?'✓ Concluído':p2>0?`${p2}%`:'Não iniciado';

    html += `<div class="ambiente-card" id="amb-${amb.id}">
      <div class="ambiente-header" onclick="toggleAmb('${amb.id}')">
        <div class="ambiente-left">
          <div class="ambiente-icon"><i class="ti ti-home-2" aria-hidden="true"></i></div>
          <div>
            <div class="ambiente-name">${amb.nome}</div>
            <div class="ambiente-sub">${its.length} itens · ${fts.length} fotos</div>
          </div>
        </div>
        <div class="ambiente-right">
          <span class="pct-badge ${badgeClass}">${badgeLabel}</span>
          ${IS_ADMIN?`<button class="btn sm danger" onclick="event.stopPropagation();deleteAmbiente('${amb.id}')" title="Excluir área"><i class="ti ti-trash" aria-hidden="true"></i></button>`:''}
          <i class="ti ti-chevron-down" id="chev-${amb.id}" style="color:var(--gray-mid);transition:transform .2s"></i>
        </div>
      </div>
      <div class="ambiente-body" id="body-${amb.id}">
        <div class="itens-list" id="itens-${amb.id}">
          ${its.length===0?`<div class="empty-state">Nenhum item ainda${IS_ADMIN?' — adicione abaixo':''}</div>`:''}
          ${its.map(it=>renderItem(it)).join('')}
        </div>
        ${IS_ADMIN?`<div class="add-item-row">
          <input class="add-item-input" id="new-item-${amb.id}" placeholder="Descrição do serviço..." onkeydown="if(event.key==='Enter')addItem('${amb.id}')">
          <button class="btn primary sm" onclick="addItem('${amb.id}')"><i class="ti ti-plus" aria-hidden="true"></i> Add</button>
        </div>`:''}
        <div class="fotos-section">
          <div class="fotos-title"><i class="ti ti-camera" aria-hidden="true"></i> Registro fotográfico</div>
          <div class="fotos-grid">
            <div class="foto-col">
              <div class="foto-col-label antes"><i class="ti ti-clock" aria-hidden="true"></i> Antes</div>

              </div>
            </div>

function renderFotoThumb(f){

function renderSignature(){
  if(obra.assinado){
    return `<div class="signature-box">
      <div class="signature-title" style="color:var(--green)"><i class="ti ti-circle-check" style="vertical-align:-2px"></i> Obra concluída e assinada</div>
      <div class="signature-sub">Assinado por <strong>${obra.assinatura_nome}</strong> em <strong>${fmtDate(obra.assinatura_data)}</strong></div>
      ${obra.assinatura_img?`<img src="${obra.assinatura_img}" style="max-width:240px;border:1px solid var(--border);border-radius:8px;margin-top:8px" alt="Assinatura">`:''}
    </div>`;
  }

  const allDone = itens.length>0 && itens.every(i=>i.concluido);

  return `<div class="signature-box">
    <div class="signature-title">Assinatura de Conclusão</div>
    <div class="signature-sub">${allDone?'Todos os itens foram concluídos. Assine para finalizar a obra.':'Complete todos os itens antes de assinar.'}</div>
    ${!allDone?`<div style="margin-top:8px;font-size:13px;color:#92400E;background:#FEF3C7;padding:8px 12px;border-radius:8px">${itens.filter(i=>!i.concluido).length} ${itens.filter(i=>!i.concluido).length===1?'item pendente':'itens pendentes'}</div>`:`
    <div style="margin-top:12px">
      <div class="sig-info" style="margin-bottom:10px">
        <div class="field"><label>Nome completo</label><input type="text" id="sig-nome" placeholder="Seu nome..."></div>
        <div class="field"><label>Data</label><input type="date" id="sig-data" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="sig-canvas-wrap">
        <canvas id="sig-canvas" width="800" height="160"></canvas>
      </div>
      <div class="sig-controls">
        <button class="btn sm" onclick="clearSig()"><i class="ti ti-eraser" aria-hidden="true"></i> Limpar</button>
        <button class="btn primary" onclick="saveSig()"><i class="ti ti-check" aria-hidden="true"></i> Confirmar assinatura</button>

// ---- INTERACTIONS ----
function toggleAmb(id){
  const body = document.getElementById('body-'+id);
  const chev = document.getElementById('chev-'+id);
  const open = body.classList.toggle('open');
  if(chev) chev.style.transform = open?'rotate(180deg)':'';
}

async function toggleItem(id){
  const it = itens.find(i=>i.id===id);
  if(!it) return;
  it.concluido = !it.concluido;
  const row = document.getElementById('item-row-'+id);
  if(row){
    row.querySelector('.item-check').className='item-check'+(it.concluido?' checked':'');
    const desc = row.querySelector('.item-desc');
    if(desc) desc.className='item-desc'+(it.concluido?' done':'');
  }
  updateProgressUI();
  try{
    await api('PATCH',`itens?id=eq.${id}`,{concluido:it.concluido});
    showToast(it.concluido?'Item marcado como concluído':'Item desmarcado');
  }catch(e){ showToast('Erro ao salvar: '+e.message); it.concluido=!it.concluido; }
}

async function saveObs(id, val){
  const it = itens.find(i=>i.id===id);
  if(it) it.observacao = val;
  try{ await api('PATCH',`itens?id=eq.${id}`,{observacao:val}); }
  catch(e){ showToast('Erro ao salvar obs.'); }
}

function updateProgressUI(){
  const p = totalPct();
  const fill = document.querySelector('.progress-fill');
  const label = document.querySelector('.progress-label span:last-child');
  const cnt = document.querySelector('.progress-label span:first-child');
  if(fill) fill.style.width=p+'%';
  if(label){ label.textContent=p+'%'; label.style.color=p>=100?'#065F46':p>50?'#92400E':'#6B7280'; }
  if(cnt) cnt.textContent=`${itens.filter(i=>i.concluido).length} de ${itens.length} itens concluídos`;
  // Update ambiente badges
  ambientes.forEach(amb=>{
    const p2=pct(amb.id);
    const badge=document.querySelector(`#amb-${amb.id} .pct-badge`);
    const sub=document.querySelector(`#amb-${amb.id} .ambiente-sub`);
    if(badge){
      badge.className='pct-badge '+(p2>=100?'done':p2>0?'partial':'none');
      badge.textContent=p2>=100?'✓ Concluído':p2>0?`${p2}%`:'Não iniciado';
    }
    if(sub){
      const its=itens.filter(i=>i.ambiente_id===amb.id);
      const fts=fotos.filter(f=>f.ambiente_id===amb.id);
      sub.textContent=`${its.length} itens · ${fts.length} fotos`;
    }
  });
}

async function addItem(ambId){
  const input = document.getElementById('new-item-'+ambId);
  const desc = input.value.trim();
  if(!desc) return;
  input.value='';
  try{
    const ordem = itens.filter(i=>i.ambiente_id===ambId).length;
    const [novo] = await api('POST','itens',{ambiente_id:ambId,descricao:desc,concluido:false,ordem});
    itens.push(novo);
    const list = document.getElementById('itens-'+ambId);
    const empty = list.querySelector('.empty-state');
    if(empty) empty.remove();
    list.insertAdjacentHTML('beforeend', renderItem(novo));
    updateProgressUI();
    showToast('Item adicionado');
  }catch(e){ showToast('Erro: '+e.message); }
}

async function deleteItem(id){
  if(!confirm('Remover este item?')) return;
  try{
    await api('DELETE',`itens?id=eq.${id}`);
    itens = itens.filter(i=>i.id!==id);
    document.getElementById('item-row-'+id)?.remove();
    updateProgressUI();
    showToast('Item removido');
  }catch(e){ showToast('Erro: '+e.message); }
}

async function handleFotoUpload(input, ambId, tipo){
  const file = input.files[0];
  if(!file) return;
  showToast('Enviando foto...');
  try{
    const url = await uploadFoto(file);
    const [nova] = await api('POST','fotos',{ambiente_id:ambId,tipo,url});
    fotos.push(nova);
    const container = document.getElementById(`fotos-${tipo}-${ambId}`);
    const addBtn = container.querySelector('label.foto-add');
    const thumb = document.createElement('div');
    thumb.innerHTML = renderFotoThumb(nova);
    container.insertBefore(thumb.firstChild, addBtn);
    updateProgressUI();
    showToast('Foto adicionada!');
  }catch(e){ showToast('Erro ao enviar foto: '+e.message); }
  input.value='';
}

async function deleteFoto(id){
  if(!confirm('Remover esta foto?')) return;
  try{
    await api('DELETE',`fotos?id=eq.${id}`);
    fotos = fotos.filter(f=>f.id!==id);
    document.querySelector(`[onclick="deleteFoto('${id}')"]`)?.closest('.foto-thumb')?.remove();
    showToast('Foto removida');
  }catch(e){ showToast('Erro: '+e.message); }
}

function openLightbox(url){
  document.getElementById('lightbox-img').src=url;
  document.getElementById('lightbox').classList.remove('hidden');
}

async function deleteAmbiente(id){
  if(!confirm('Excluir esta área e todos os itens/fotos?')) return;
  try{
    await api('DELETE',`ambientes?id=eq.${id}`);
    ambientes = ambientes.filter(a=>a.id!==id);
    itens = itens.filter(i=>i.ambiente_id!==id);
    fotos = fotos.filter(f=>f.ambiente_id!==id);
    document.getElementById('amb-'+id)?.remove();
    updateProgressUI();
    showToast('Área removida');
  }catch(e){ showToast('Erro: '+e.message); }
}

// ---- SIGNATURE ----
let sigDrawing=false, sigCtx=null, sigLast={x:0,y:0};

function initSig(){
  const canvas=document.getElementById('sig-canvas');
  if(!canvas) return;
  sigCtx=canvas.getContext('2d');
  sigCtx.strokeStyle='#1a1a2e';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round';
  const getXY=(e)=>{const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(canvas.width/r.width),y:(t.clientY-r.top)*(canvas.height/r.height)};};
  canvas.addEventListener('mousedown',e=>{sigDrawing=true;sigLast=getXY(e);});
  canvas.addEventListener('mousemove',e=>{if(!sigDrawing)return;const p=getXY(e);sigCtx.beginPath();sigCtx.moveTo(sigLast.x,sigLast.y);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigLast=p;});
  canvas.addEventListener('mouseup',()=>sigDrawing=false);
  canvas.addEventListener('mouseleave',()=>sigDrawing=false);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();sigDrawing=true;sigLast=getXY(e);});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!sigDrawing)return;const p=getXY(e);sigCtx.beginPath();sigCtx.moveTo(sigLast.x,sigLast.y);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigLast=p;});
  canvas.addEventListener('touchend',()=>sigDrawing=false);
}

function clearSig(){const c=document.getElementById('sig-canvas');if(c&&sigCtx)sigCtx.clearRect(0,0,c.width,c.height);}

async function saveSig(){
  const nome=document.getElementById('sig-nome').value.trim();
  const data=document.getElementById('sig-data').value;
  if(!nome){showToast('Digite seu nome');return;}
  const canvas=document.getElementById('sig-canvas');
  const imgData=canvas.toDataURL('image/png');
  try{
    await api('PATCH',`obras?id=eq.${obra.id}`,{assinado:true,assinatura_nome:nome,assinatura_data:data,assinatura_img:imgData});
    obra.assinado=true;obra.assinatura_nome=nome;obra.assinatura_data=data;obra.assinatura_img=imgData;
    const sigBox=document.querySelector('.signature-box');
    if(sigBox) sigBox.outerHTML=renderSignature();
    showToast('Assinatura salva!');
  }catch(e){ showToast('Erro: '+e.message); }
}

// ---- UTILS ----
function fmtDate(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR');}catch{return d;}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}


// ---- CLIENT VIEW ----
let clientChecks = {};
let clientSigCtx = null, clientSigDrawing = false, clientSigLast = {x:0,y:0};

async function renderClientView(){
  document.getElementById('mode-badge').textContent = '👤 Cliente';
  document.getElementById('mode-badge').className = 'mode-badge client';
  const tb = document.getElementById('topbar-actions');
  tb.innerHTML = `<span style="color:#ccc;font-size:12px">Checklist de aprovação</span>`;

  // Load client checks from obra
  try {
    clientChecks = obra.cliente_checks ? (typeof obra.cliente_checks === 'string' ? JSON.parse(obra.cliente_checks) : obra.cliente_checks) : {};
  } catch(e) { clientChecks = {}; }

  renderClientContent();
}

function renderClientContent(){
  const totalItens = itens.length;
  const checked = Object.values(clientChecks).filter(Boolean).length;
  const pct = totalItens > 0 ? Math.round(checked/totalItens*100) : 0;

  let html = `<div class="client-checklist">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:22px;font-weight:700;color:#4C1D95;margin-bottom:4px">${obra.nome}</div>
      <div style="font-size:13px;color:var(--gray-mid)">${obra.local||''} ${obra.responsavel?'· Resp: '+obra.responsavel:''}</div>
      <div style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--gray-mid);margin-bottom:4px">
          <span>${checked} de ${totalItens} itens aprovados</span><span style="font-weight:600;color:#4C1D95">${pct}%</span>
        </div>
        <div class="client-progress"><div class="client-progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;

  ambientes.forEach(amb => {
    const ambItens = itens.filter(i => i.ambiente_id === amb.id);
    if(!ambItens.length) return;
    const ambFotos = fotos.filter(f => f.ambiente_id === amb.id);
    const ambChecked = ambItens.filter(i => clientChecks[i.id]).length;

    html += `<div class="client-amb-title"><i class="ti ti-home-2" aria-hidden="true"></i> ${amb.nome} <span style="font-size:11px;font-weight:400;color:#6B7280;margin-left:4px">${ambChecked}/${ambItens.length}</span></div>`;

    ambItens.forEach(it => {
      const checked = clientChecks[it.id] || false;
      html += `<div class="client-item" id="ci-${it.id}">
        <div class="client-check ${checked?'checked':''}" onclick="toggleClientCheck('${it.id}')" role="checkbox" aria-checked="${checked}"></div>
        <div class="client-item-text ${checked?'done':''}">${it.descricao}</div>
      </div>`;
    });

    // Show after photos if any
    const depoisFotos = ambFotos.filter(f=>f.tipo==='depois');
    if(depoisFotos.length){
      html += `<div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 0 4px">`;
      depoisFotos.forEach(f=>{
        html += `<div style="width:64px;height:64px;border-radius:8px;overflow:hidden;border:1px solid var(--border)"><img src="${f.url}" style="width:100%;height:100%;object-fit:cover;cursor:pointer" onclick="openLightbox('${f.url}')" loading="lazy"></div>`;
      });
      html += `</div>`;
    }
  });

  html += `</div>`;

  // Signature
  if(obra.cliente_assinado){
    html += `<div class="client-sig-box">
      <div style="font-size:18px;font-weight:700;color:#065F46;margin-bottom:6px"><i class="ti ti-circle-check"></i> Aprovado e assinado</div>
      <div style="font-size:13px;color:var(--gray-mid)">Assinado por <strong>${obra.cliente_assinatura_nome}</strong> em <strong>${fmtDate(obra.cliente_assinatura_data)}</strong></div>
      ${obra.cliente_assinatura_img?`<img src="${obra.cliente_assinatura_img}" style="max-width:240px;border:1px solid var(--border);border-radius:8px;margin-top:12px" alt="Assinatura do cliente">`:''}
    </div>`;
  } else {
    const allChecked = totalItens > 0 && Object.values(clientChecks).filter(Boolean).length === totalItens;
    html += `<div class="client-sig-box">
      <div style="font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:6px">Aprovação final</div>
      <div style="font-size:13px;color:var(--gray-mid);margin-bottom:16px">${allChecked ? 'Todos os itens foram verificados. Assine para confirmar a aprovação.' : `Verifique todos os ${totalItens} itens antes de assinar.`}</div>
      ${!allChecked ? `<div style="font-size:13px;color:#92400E;background:#FEF3C7;padding:8px 12px;border-radius:8px">${totalItens - Object.values(clientChecks).filter(Boolean).length} itens ainda não verificados</div>` : `
      <div style="margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap">
        <div style="flex:1;min-width:140px"><label style="display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:4px">Nome completo</label><input type="text" id="csig-nome" placeholder="Seu nome..." style="width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none"></div>
        <div style="flex:1;min-width:140px"><label style="display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:4px">Data</label><input type="date" id="csig-data" value="${new Date().toISOString().slice(0,10)}" style="width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none"></div>
      </div>
      <div style="border:2px dashed #D1D5DB;border-radius:8px;margin-bottom:10px;overflow:hidden;cursor:crosshair;background:#FAFAFA">
        <canvas id="csig-canvas" width="700" height="140" style="display:block;width:100%;touch-action:none"></canvas>
      </div>
      <div style="display:flex;gap:8px;justify-content:center">
        <button class="btn sm" onclick="clearClientSig()"><i class="ti ti-eraser" aria-hidden="true"></i> Limpar</button>
        <button class="btn primary" style="background:#7C3AED;border-color:#7C3AED" onclick="saveClientSig()"><i class="ti ti-check" aria-hidden="true"></i> Assinar e aprovar</button>
      </div>`}
    </div>`;
  }

  document.getElementById('main-content').innerHTML = html;

  // Init canvas
  setTimeout(()=>{
    const canvas = document.getElementById('csig-canvas');
    if(!canvas) return;
    clientSigCtx = canvas.getContext('2d');
    clientSigCtx.strokeStyle='#1a1a2e';clientSigCtx.lineWidth=2.5;clientSigCtx.lineCap='round';clientSigCtx.lineJoin='round';
    const getXY=(e)=>{const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(canvas.width/r.width),y:(t.clientY-r.top)*(canvas.height/r.height)};};
    canvas.addEventListener('mousedown',e=>{clientSigDrawing=true;clientSigLast=getXY(e);});
    canvas.addEventListener('mousemove',e=>{if(!clientSigDrawing)return;const p=getXY(e);clientSigCtx.beginPath();clientSigCtx.moveTo(clientSigLast.x,clientSigLast.y);clientSigCtx.lineTo(p.x,p.y);clientSigCtx.stroke();clientSigLast=p;});
    canvas.addEventListener('mouseup',()=>clientSigDrawing=false);
    canvas.addEventListener('mouseleave',()=>clientSigDrawing=false);
    canvas.addEventListener('touchstart',e=>{e.preventDefault();clientSigDrawing=true;clientSigLast=getXY(e);});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();if(!clientSigDrawing)return;const p=getXY(e);clientSigCtx.beginPath();clientSigCtx.moveTo(clientSigLast.x,clientSigLast.y);clientSigCtx.lineTo(p.x,p.y);clientSigCtx.stroke();clientSigLast=p;});
    canvas.addEventListener('touchend',()=>clientSigDrawing=false);
  }, 100);
}

async function toggleClientCheck(itemId){
  clientChecks[itemId] = !clientChecks[itemId];
  try{
    await api('PATCH',`obras?id=eq.${obra.id}`,{cliente_checks: clientChecks});
    obra.cliente_checks = clientChecks;
  }catch(e){ console.warn('Save error:', e); }
  renderClientContent();
}

function clearClientSig(){
  const c=document.getElementById('csig-canvas');
  if(c&&clientSigCtx) clientSigCtx.clearRect(0,0,c.width,c.height);
}

async function saveClientSig(){
  const nome = document.getElementById('csig-nome')?.value?.trim();
  const data = document.getElementById('csig-data')?.value;
  if(!nome){ showToast('Digite seu nome'); return; }
  const canvas = document.getElementById('csig-canvas');
  const imgData = canvas.toDataURL('image/png');
  try{
    await api('PATCH',`obras?id=eq.${obra.id}`,{
      cliente_assinado: true,
      cliente_assinatura_nome: nome,
      cliente_assinatura_data: data,
      cliente_assinatura_img: imgData
    });
    obra.cliente_assinado=true;
    obra.cliente_assinatura_nome=nome;
    obra.cliente_assinatura_data=data;
    obra.cliente_assinatura_img=imgData;
    showToast('Aprovação registrada!');
    renderClientContent();
  }catch(e){ showToast('Erro: '+e.message); }
}

// ---- INIT ----
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))e.target.classList.add('hidden');});

// Observe DOM for signature canvas
const observer=new MutationObserver(()=>{if(document.getElementById('sig-canvas')&&!sigCtx)initSig();});
observer.observe(document.body,{childList:true,subtree:true});

// Pre-populate with escopo data if new obra
async function seedEscopo(obraId){
  const areas=[
    {nome:"WC Feminino",itens:["Pintura das paredes acima do azulejo","Pintura de batente e guarnição em tinta esmalte","Pintura da folha de porta"]},
    {nome:"WC Masculino",itens:["Pintura das paredes acima do azulejo","Pintura de batente e guarnição em tinta esmalte","Pintura da folha de porta"]},
    {nome:"WC PCD",itens:["Pintura das paredes acima do azulejo","Pintura de batente e guarnição em tinta esmalte","Pintura da folha de porta"]},
    {nome:"Sala do Servidor",itens:["Pintura das paredes acima do azulejo","Pintura de batente e guarnição em tinta esmalte","Pintura da folha de porta"]},
    {nome:"Sala de Reunião",itens:["Retoques pontuais em massa","Lixamento","Pintura das paredes","Pintura de batente e guarnição em tinta esmalte","Pintura da porta em tinta esmalte"]},
    {nome:"Anti Sala de Reunião",itens:["Retoques pontuais em massa","Lixamento","Pintura das paredes","Pintura de batente e guarnição em tinta esmalte","Pintura da porta em tinta esmalte"]},
    {nome:"Sala Administrativa",itens:["Retoques pontuais em massa","Lixamento","Pintura das paredes","Pintura de batente e guarnição em tinta esmalte","Controle de qualidade do serviço executado"]},
    {nome:"Sala de Estoque",itens:["Retoques pontuais em massa","Lixamento","Pintura das paredes","Pintura de batente e guarnição em tinta esmalte","Pintura da porta em tinta esmalte"]},
    {nome:"Salão de Vendas",itens:["Executar pintura sobre tinta laranja (faixa)","Executar pintura de todas as paredes na cor branca","Executar pintura de faixas decorativas (verde cítrico)"]},
    {nome:"Pórtico",itens:["Instalar novamente a tubulação","Pintar tubulação na cor verde","Finalizar pintura","Organizar fiação","Arrumar cerca elétrica","Pintar dentro do vão do portão"]},
    {nome:"Gradil",itens:["Executar a limpeza / lavagem","Pintura do gradil"]},
    {nome:"Muro",itens:["Remoção das placas","Pintura faixa cor CINZA","Pintura faixa cor LARANJA","Pintura faixa cor BRANCA"]},
    {nome:"Lava Rápido",itens:["Pintura do piso","Pintura da ferragem"]},
    {nome:"Testeira da Loja",itens:["Remover todos os escritos e logo","Tampar furos","Executar pintura na cor verde bandeira"]},
    {nome:"Corpo da Loja",itens:["Remover todos os escritos e logo","Tampar furos","Executar pintura na cor verde cítrica"]},
    {nome:"Interno Loja",itens:["Executar pintura na faixa cor verde","Executar pintura na cor branca — salão principal","Instalar porta copo","Instalar porta papel","Fazer bota fora de resíduos","Realizar manutenção do auto falante","Colar azulejo faltando no banheiro","Solda dos cavaletes"]},
  ];
  for(let i=0;i<areas.length;i++){
    const [amb]=await api('POST','ambientes',{obra_id:obraId,nome:areas[i].nome,ordem:i});
    ambientes.push(amb);
    for(let j=0;j<areas[i].itens.length;j++){
      const [it]=await api('POST','itens',{ambiente_id:amb.id,descricao:areas[i].itens[j],concluido:false,ordem:j});
      itens.push(it);
    }
  }
}

// Check if we should seed
async function init(){
  if(!OBRA_ID){
    if(IS_CLIENT){document.getElementById('main-content').innerHTML='<div class="loading-full" style="color:#991b1b">Link inválido. Solicite um novo link ao administrador.</div>';return;}
    loadObrasList();
    return;
  }
  await loadAll();
  if(IS_CLIENT){ renderClientView(); return; }
  if(IS_ADMIN && obra && ambientes.length===0){
    openModal(`<h3>Popular com escopo padrão?</h3>
      <p style="font-size:13px;color:var(--gray-mid);margin-bottom:14px">Deseja adicionar automaticamente todas as áreas e serviços do escopo de pintura da Localiza Seminovos?</p>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Não, farei manualmente</button>
        <button class="btn primary" onclick="doSeed()"><i class="ti ti-wand"></i> Sim, preencher automaticamente</button>
      </div>`);
  }
}

async function doSeed(){
  closeModal();
  showToast('Populando áreas e serviços...');
  await seedEscopo(obra.id);
  renderMain();
  showToast('Escopo carregado com sucesso!');
}

init();
</script>
